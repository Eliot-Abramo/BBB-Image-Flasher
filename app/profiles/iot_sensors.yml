# ============================================================
#  IOT & SENSORS — Connect everything, log everything
# ============================================================
#
#  What you get:
#    - MQTT broker (Mosquitto) for IoT messaging
#    - Python MQTT client (paho-mqtt)
#    - GPIO, I2C, SPI, UART hardware interfaces
#    - SQLite database for local data logging
#    - Networking tools (nmap, tcpdump)
#    - HTTP tools (curl, jq) for calling REST APIs
#    - WiFi tools for scanning/connecting to networks
#    - Python scientific stack for data analysis
#
#  Best for: Smart home projects, sensor networks,
#  data loggers, IoT dashboards, and any project
#  that needs your BBB to talk to the internet.
#
schema_version: 1
board: beaglebone-black
base_image:
  url: https://files.beagle.cc/file/beagleboard-public-2021/images/am335x-debian-13.4-base-v6.18-armhf-2026-03-17-4gb.img.xz
  sha256: f82f719020014a8455f754ba002238f19a963410edc25d73ac98f380bc3c6d01
  label: BeagleBone Black Debian 13.4 IoT 2026-03-17
freeze:
  debian_snapshot: "2026-03-17T00:00:00Z"
provision_mode: offline
system:
  hostname: bbb-iot
  timezone: UTC
  locale: en_US.UTF-8
user:
  username: student
  password: beaglebone
  password_locked: false
  authorized_keys: []
bundles:
  - core-dev
  - python
  - python-science
  - gpio
  - i2c-spi
  - uart-serial
  - mqtt
  - networking
  - http-tools
  - sqlite
  - wifi-tools
apt:
  extra_packages: []
network:
  wifi: null
  ethernet:
    mode: dhcp
ssh:
  disable_password_auth: false
  permit_root_login: false
output:
  artifact_name: bbb-iot-sensors.img.xz
