# ============================================================
#  ROBOTICS STARTER — Build your first robot
# ============================================================
#
#  What you get:
#    - Python 3 + scientific stack
#    - C/C++ compiler and CMake
#    - GPIO, I2C, SPI, UART hardware control
#    - Motor and servo libraries (PCA9685 PWM board)
#    - Sensor libraries (IMU, GPS, distance sensors)
#    - Serial terminal tools for talking to Arduino
#    - Core developer tools
#
#  Best for: First-year engineering robotics projects.
#  Control motors, read sensors, run control loops.
#
schema_version: 1
board: beaglebone-black
base_image:
  url: https://files.beagle.cc/file/beagleboard-public-2021/images/am335x-debian-13.4-base-v6.18-armhf-2026-03-17-4gb.img.xz
  sha256: f82f719020014a8455f754ba002238f19a963410edc25d73ac98f380bc3c6d01
  label: BeagleBone Black Debian 13.4 IoT 2026-03-17
freeze:
  debian_snapshot: "2026-03-17T00:00:00Z"
provision_mode: offline
system:
  hostname: bbb-robot
  timezone: UTC
  locale: en_US.UTF-8
user:
  username: student
  password: beaglebone
  password_locked: false
  authorized_keys: []
bundles:
  - core-dev
  - python
  - python-science
  - cpp
  - gpio
  - i2c-spi
  - uart-serial
  - pwm-servo
  - robotics-sensors
  - robotics-lite
apt:
  extra_packages: []
network:
  wifi: null
  ethernet:
    mode: dhcp
ssh:
  disable_password_auth: false
  permit_root_login: false
output:
  artifact_name: bbb-robotics-starter.img.xz
