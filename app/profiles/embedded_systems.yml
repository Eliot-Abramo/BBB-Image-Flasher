# ============================================================
#  EMBEDDED SYSTEMS — Low-level C/C++ development
# ============================================================
#
#  What you get:
#    - GCC/G++ compiler, CMake, Make, pkg-config
#    - Clang/LLDB (alternative compiler with better errors)
#    - Boost C++ libraries (threading, filesystem, networking)
#    - GDB + Valgrind for debugging and memory checking
#    - GPIO, I2C, SPI, UART, CAN bus interfaces
#    - Python for scripting and quick tests
#    - Cross-compilation friendly environment
#
#  Best for: Embedded C/C++ coursework, firmware-style
#  programming on Linux, systems programming, driver development,
#  and projects where every byte and cycle counts.
#
