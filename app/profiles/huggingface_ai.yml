# ============================================================
#  HUGGING FACE AI — Transformers and NLP on the BBB
# ============================================================
#
#  What you get:
#    - Hugging Face Transformers library (BERT, GPT-2, T5…)
#    - Hugging Face Datasets and Tokenizers
#    - NLTK (Natural Language Toolkit)
#    - scikit-learn for traditional ML
#    - Full scientific Python stack
#    - OpenCV for vision+language tasks
#
#  NOTE: Large language models (GPT-2, BERT-large) may run
#  slowly or run out of memory on the BBB's 512 MB RAM.
#  Use small/distilled model variants (DistilBERT, TinyBERT)
#  for best results. Smaller models work great!
#
#  Best for: NLP coursework, text classification,
#  sentiment analysis, question answering, and
#  experimenting with pre-trained AI models.
#
schema_version: 1
board: beaglebone-black
base_image:
  url: https://files.beagle.cc/file/beagleboard-public-2021/images/am335x-debian-13.4-base-v6.18-armhf-2026-03-17-4gb.img.xz
  sha256: f82f719020014a8455f754ba002238f19a963410edc25d73ac98f380bc3c6d01
  label: BeagleBone Black Debian 13.4 IoT 2026-03-17
freeze:
  debian_snapshot: "2026-03-17T00:00:00Z"
provision_mode: offline
system:
  hostname: bbb-hf
  timezone: UTC
  locale: en_US.UTF-8
user:
  username: student
  password: beaglebone
  password_locked: false
  authorized_keys: []
bundles:
  - core-dev
  - python
  - python-science
  - python-ml
  - huggingface
  - ml-nlp
  - sqlite
apt:
  extra_packages: []
network:
  wifi: null
  ethernet:
    mode: dhcp
ssh:
  disable_password_auth: false
  permit_root_login: false
output:
  artifact_name: bbb-huggingface-ai.img.xz
