# ============================================================
#  FULL ROBOTICS STACK — Everything for serious robotics
# ============================================================
#
#  What you get:
#    - Python 3 + full scientific stack
#    - C/C++ + advanced C++ tools (Clang, Boost)
#    - OpenCV + camera tools for vision
#    - scikit-learn + TFLite for machine learning
#    - GPIO, I2C, SPI, UART, CAN bus
#    - Motor/servo control (PCA9685 PWM)
#    - Sensor libraries (IMU, GPS, ADC)
#    - MQTT for messaging between robot components
#    - SQLite for data logging
#    - Network diagnostics
#    - System monitoring
#
#  NOTE: This image is large (~2 GB installed). Building it
#  takes 15–30 minutes. The SD card must be at least 8 GB.
#
#  Best for: Senior robotics projects, competition robots,
#  thesis projects — when you want every tool available.
#
schema_version: 1
board: beaglebone-black
base_image:
  url: https://files.beagle.cc/file/beagleboard-public-2021/images/am335x-debian-13.4-base-v6.18-armhf-2026-03-17-4gb.img.xz
  sha256: f82f719020014a8455f754ba002238f19a963410edc25d73ac98f380bc3c6d01
  label: BeagleBone Black Debian 13.4 IoT 2026-03-17
freeze:
  debian_snapshot: "2026-03-17T00:00:00Z"
provision_mode: offline
system:
  hostname: bbb-fullstack
  timezone: UTC
  locale: en_US.UTF-8
user:
  username: student
  password: beaglebone
  password_locked: false
  authorized_keys: []
bundles:
  - core-dev
  - python
  - python-science
  - python-ml
  - cpp
  - cpp-advanced
  - opencv
  - camera-tools
  - image-processing
  - tflite
  - onnx-runtime
  - gpio
  - i2c-spi
  - uart-serial
  - pwm-servo
  - robotics-motors
  - robotics-sensors
  - robotics-lite
  - mqtt
  - networking
  - sqlite
  - monitoring
  - can-bus
  - adc-sensors
apt:
  extra_packages: []
network:
  wifi: null
  ethernet:
    mode: dhcp
ssh:
  disable_password_auth: false
  permit_root_login: false
output:
  artifact_name: bbb-full-robotics.img.xz
