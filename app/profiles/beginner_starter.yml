# ============================================================
#  BEGINNER STARTER — Perfect first image for new BBB users
# ============================================================
#
#  What you get:
#    - Python 3 with pip
#    - Basic shell tools (git, curl, nano, htop…)
#    - SSH access with a password you choose
#
#  Best for: Anyone using a BBB for the very first time.
#  You can log in with: ssh student@<ip-address>
#
schema_version: 1
board: beaglebone-black
base_image:
  url: https://files.beagle.cc/file/beagleboard-public-2021/images/am335x-debian-13.4-base-v6.18-armhf-2026-03-17-4gb.img.xz
  sha256: f82f719020014a8455f754ba002238f19a963410edc25d73ac98f380bc3c6d01
  label: BeagleBone Black Debian 13.4 IoT 2026-03-17
freeze:
  debian_snapshot: "2026-03-17T00:00:00Z"
provision_mode: offline
system:
  hostname: bbb-starter
  timezone: UTC
  locale: en_US.UTF-8
user:
  username: student
  password: beaglebone          # Change this! Log in: ssh student@<ip>
  password_locked: false
  authorized_keys: []
bundles:
  - core-dev
  - python
  - uart-serial
apt:
  extra_packages: []
network:
  wifi: null
  ethernet:
    mode: dhcp
ssh:
  disable_password_auth: false   # Password login ON so you can connect easily
  permit_root_login: false
output:
  artifact_name: bbb-starter.img.xz
