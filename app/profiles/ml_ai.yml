# ============================================================
#  ML / AI STARTER — Machine learning on the edge
# ============================================================
#
#  What you get:
#    - Python 3 with full scientific stack
#    - scikit-learn (classic ML algorithms: decision trees,
#      SVM, random forests, k-means, neural networks)
#    - TensorFlow Lite (run pre-trained image classifiers
#      and object detectors with low memory usage)
#    - ONNX Runtime (run models exported from PyTorch/TF)
#    - OpenCV for vision input to your ML models
#    - C++ tools for performance-critical code
#
#  Best for: Edge AI projects, tinyML experiments,
#  deploying trained models to a physical device.
#
schema_version: 1
