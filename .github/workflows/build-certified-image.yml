name: Build Certified Image

run-name: "bbb-image:${{ inputs.request_id }}:${{ inputs.profile_id }}"

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: Unique request identifier from BBB Image Forge
        required: true
        type: string
      profile_id:
        description: Certified profile id to build
        required: true
        type: string
      addon_bundle_ids:
        description: JSON array of optional certified add-on bundle ids
        required: false
        default: "[]"
        type: string
      artifact_name:
        description: Output image file name
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: Build BBB image
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-user-static \
            xz-utils \
            parted \
            util-linux \
            mount \
            rsync \
            file

      - name: Build certified generic image
        env:
          REQUEST_ID: ${{ inputs.request_id }}
          PROFILE_ID: ${{ inputs.profile_id }}
          ADDON_BUNDLE_IDS: ${{ inputs.addon_bundle_ids }}
          ARTIFACT_NAME: ${{ inputs.artifact_name }}
        run: |
          mkdir -p ci-work/export
          sudo env \
            PATH="$PATH" \
            PYTHONPATH="$PWD" \
            "$(which python)" \
            scripts/ci_build_certified_image.py \
            --request-id "$REQUEST_ID" \
            --profile-id "$PROFILE_ID" \
            --addon-bundle-ids "$ADDON_BUNDLE_IDS" \
            --artifact-name "$ARTIFACT_NAME" \
            --work-dir "$PWD/ci-work" \
            --export-dir "$PWD/ci-work/export"

      - name: Upload build artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: bbb-image-${{ inputs.request_id }}
          path: ci-work/export/
          if-no-files-found: error
          retention-days: 14
